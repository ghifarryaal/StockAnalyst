services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL}
    ports:
      - "3000:80"
    depends_on:
      - backend
      - pocketbase
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    restart: always

  pocketbase:
    build:
      context: ./pocketbase
    ports:
      - "8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    command:
      - /pb/pocketbase
      - serve
      - --http=0.0.0.0:8090
    restart: always
